<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-BOOT ULTIMATE</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #FFD700; font-size: 40px; margin: 0; text-shadow: 0 0 10px #FFD700; }
        .header p { color: #00FF00; margin: 5px 0; font-weight: bold; letter-spacing: 2px; }

        /* Selection Box Area */
        .selection-container {
            background: #111;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .radio-group { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .radio-group input { width: 18px; height: 18px; cursor: pointer; }

        /* ID Input Section */
        #auth-section { margin-bottom: 20px; text-align: center; }
        .input-field {
            padding: 12px;
            background: #000;
            border: 2px solid #0000FF;
            color: #fff;
            width: 200px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        /* Thimble Layout */
        .game-container { display: none; flex-direction: column; align-items: center; }
        .boxes { display: flex; gap: 15px; margin: 20px 0; }
        
        .box-unit { display: flex; flex-direction: column; align-items: center; }
        .box-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        
        .thimble-box {
            width: 100px;
            height: 100px;
            border: 2px solid #FFFFFF; /* আপনার স্ক্রিনশটের মতো সাদা বর্ডার */
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .ball-img {
            width: 75%;
            height: 75%;
            object-fit: contain;
            display: none;
        }

        /* Buttons */
        .btn {
            background: #0000FF;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }

        .btn:active { transform: scale(0.98); }
        #status { margin: 15px 0; color: #FFD700; font-weight: bold; height: 20px; }

        /* Animation */
        .scan-active { border-color: #00FF00 !important; box-shadow: 0 0 15px #00FF00; }
    </style>
</head>
<body>

    <div class="header">
        <h1>X-BOOT</h1>
        <p>'X-BOOT PREDICTOR</p>
    </div>

    <div id="auth-section">
        <input type="text" id="userId" class="input-field" placeholder="Enter ID (9-10 Digits)">
        <br><br>
        <button class="btn" onclick="connect()" style="background:#222; border:1px solid #0000FF;">SAVE & START</button>
    </div>

    <div class="game-container" id="main-ui">
        
        <div class="selection-container">
            <span style="color:#FFD700">SELECT MODE:</span>
            <label class="radio-group">
                <input type="radio" name="ballCount" value="1" checked> 1 BALL
            </label>
            <label class="radio-group">
                <input type="radio" name="ballCount" value="2"> 2 BALLS
            </label>
        </div>

        <div class="boxes">
            <div class="box-unit">
                <div class="box-label"></div>
                <div class="thimble-box" id="box0">
                    <img src="https://i.ibb.co/tMkZpX3/2024-12-20-182933.png" class="ball-img">
                </div>
            </div>
            <div class="box-unit">
                <div class="box-label"></div>
                <div class="thimble-box" id="box1">
                    <img src="https://i.ibb.co/tMkZpX3/2024-12-20-182933.png" class="ball-img">
                </div>
            </div>
            <div class="box-unit">
                <div class="box-label"></div>
                <div class="thimble-box" id="box2">
                    <img src="https://i.ibb.co/tMkZpX3/2024-12-20-182933.png" class="ball-img">
                </div>
            </div>
        </div>

        <div id="status">System Online</div>

        <button class="btn" id="pBtn" onclick="runPrediction()">Prédire la balle</button>
        <button class="btn" style="background:#333; font-size:12px;" onclick="resetGame()">CLEAR DATA</button>

    </div>

    <script>
        function connect() {
            const id = document.getElementById('userId').value;
            if (id.length >= 9) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else {
                alert("Please enter a valid 9 or 10 digit ID");
            }
        }

        function runPrediction() {
            const status = document.getElementById('status');
            const btn = document.getElementById('pBtn');
            const boxes = [document.getElementById('box0'), document.getElementById('box1'), document.getElementById('box2')];
            const imgs = document.querySelectorAll('.ball-img');
            const mode = document.querySelector('input[name="ballCount"]:checked').value;

            // Reset UI
            imgs.forEach(img => img.style.display = 'none');
            btn.disabled = true;
            status.innerText = "Analyzing Server Data...";

            // Simple Scan Animation
            let count = 0;
            let interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('scan-active'));
                boxes[count % 3].classList.add('scan-active');
                count++;
            }, 100);

            setTimeout(() => {
                clearInterval(interval);
                boxes.forEach(b => b.classList.remove('scan-active'));
                
                // Logic based on Selection
                let indices = [0, 1, 2];
                indices.sort(() => Math.random() - 0.5); // Shuffle indices

                if (mode == "1") {
                    imgs[indices[0]].style.display = 'block';
                    status.innerText = "Target Found: Box " + (indices[0] + 1);
                } else {
                    imgs[indices[0]].style.display = 'block';
                    imgs[indices[1]].style.display = 'block';
                    status.innerText = "Targets Found: Box " + (indices[0] + 1) + " & " + (indices[1] + 1);
                }

                btn.disabled = false;
            }, 2500);
        }

        function resetGame() {
            document.querySelectorAll('.ball-img').forEach(img => img.style.display = 'none');
            document.getElementById('status').innerText = "System Ready";
        }
    </script>
</body>
</html>
